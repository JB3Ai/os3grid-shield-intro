name: Deploy to cPanel

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy static site to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          local-dir: ./
          server-dir: ./public_html/os3grid-shield-intro/
          timeout: 600000
          dangerous-clean-slate: false
          exclude: |
            **/.git*/**
            **/.git*
            **/node_modules/**
            **/.DS_Store
            **/package-lock.json
